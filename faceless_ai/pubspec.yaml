name: faceless_ai
description: "Faceless AI — Generate viral product showcase videos with AI"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter

  # UI & Design
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0
  lottie: ^3.1.2
  cached_network_image: ^3.4.1
  flutter_animate: ^4.5.0

  # State Management
  flutter_bloc: ^9.1.0
  equatable: ^2.0.7

  # Navigation
  go_router: ^14.8.1

  # Backend & API
  supabase_flutter: ^2.9.0
  dio: ^5.7.0
  sign_in_with_apple: ^7.0.1
  crypto: ^3.0.6

  # Media
  image_picker: ^1.1.2
  video_player: ^2.9.2
  chewie: ^1.8.5

  # Storage & Local
  shared_preferences: ^2.3.4
  path_provider: ^2.1.5
  uuid: ^4.5.1

  # Utils
  intl: ^0.20.1
  url_launcher: ^6.3.1
  share_plus: ^10.1.4
  gal: ^2.3.0
  permission_handler: ^11.3.1
  flutter_dotenv: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/
    - assets/images/onboarding/
    - assets/animations/


